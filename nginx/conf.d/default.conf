# ==============================================================================
# Nginx 리버스 프록시 설정
# ==============================================================================
# 도메인 기반 라우팅:
# - yourblog.com (또는 blog.yourblog.com) → WordPress
# - admin.yourblog.com → 관리자 대시보드
# - pipeline.yourblog.com → 파이프라인 에디터
# ==============================================================================

# WordPress (메인 블로그)
upstream wordpress_backend {
    server wordpress:80;
}

# 관리자 대시보드
upstream admin_backend {
    server admin-dashboard:5000;
}

# 파이프라인 에디터
upstream pipeline_backend {
    server pipeline-editor:5002;
}

# 검토 대시보드
upstream review_backend {
    server review-dashboard:5000;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name _;

    # Let's Encrypt 인증서 발급 경로
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl http2;
    server_name _;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 메인 블로그 (WordPress)
    location / {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # WordPress REST API
    location /wp-json/ {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 관리자 대시보드 (/admin 경로)
    location /admin/ {
        proxy_pass http://admin_backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # 파이프라인 에디터 (/pipeline 경로)
    location /pipeline-editor/ {
        proxy_pass http://pipeline_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # 검토 대시보드 (/review 경로)
    location /review/ {
        proxy_pass http://review_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # 헬스체크
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}